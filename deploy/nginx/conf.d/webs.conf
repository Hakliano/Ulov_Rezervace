# Statické weby — ulovklienty.cz + demo salony (automatické mapování demoN → salonN)
#
# Vyžaduje wildcard DNS:  *.ulovklienty.cz  A  →  IP serveru
# Nový salon: nahrajte www/salonN/ a (dokud nemáte wildcard SSL) rozšiřte cert:
#   bash deploy/expand-webs-cert.sh demoN.ulovklienty.cz

map $host $salon_www_root {
    default "";
    ~^demo(?<id>[0-9]+)\.ulovklienty\.cz$ /var/www/sites/salon$id;
}

# HTTP → HTTPS
server {
    listen 80;
    server_name ulovklienty.cz www.ulovklienty.cz
                ~^demo[0-9]+\.ulovklienty\.cz$;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Presentace — hlavní doména + vertikální dema (cesty /zdravi-fyzio/ apod.)
server {
    listen 443 ssl;
    http2 on;
    server_name ulovklienty.cz www.ulovklienty.cz;

    ssl_certificate     /etc/letsencrypt/live/ulovklienty.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ulovklienty.cz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/sites/presentace;
    index index.html;

    # Sdílené assety (creator footer…)
    location /shared/ {
        alias /var/www/sites/shared/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Vertikální dema mimo presentace/ (odkazy z hubu: /provoz-pujcovna/ …)
    location ~ ^/(flow|partner|zdravi-fyzio|zdravi-veterina|zdravi-dental|remesla-instalater|remesla-elektrikar|remesla-rekonstrukce|provoz-autoservis|provoz-pujcovna|provoz-studio)(/|$) {
        root /var/www/sites;
        try_files $uri $uri/ =404;
    }

    # Bez SPA fallbacku — neexistující cesta nesmí vracet hub bez CSS
    location / {
        try_files $uri $uri/ =404;
    }
}

# Demo salony — jeden blok pro demo1, demo2, … demo99
# demo7.ulovklienty.cz  →  /var/www/sites/salon7
server {
    listen 443 ssl;
    http2 on;
    server_name ~^demo[0-9]+\.ulovklienty\.cz$;

    ssl_certificate     /etc/letsencrypt/live/ulovklienty.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ulovklienty.cz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Sdílené assety (creator footer CSS…) — mimo root salonu
    location /shared/ {
        alias /var/www/sites/shared/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        root $salon_www_root;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
