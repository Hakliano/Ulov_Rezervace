# Staging — staging.ulovklienty.cz + api-staging.ulovklienty.cz
# Cert: stejný jako weby (po expand) nebo dočasně self — viz deploy/expand-staging-cert.sh

map $host $staging_salon_root {
    default "";
    ~^demo(?<id>[0-9]+)\.staging\.ulovklienty\.cz$ /var/www/sites-staging/salon$id;
}

# HTTP → HTTPS (+ ACME)
server {
    listen 80;
    server_name staging.ulovklienty.cz www.staging.ulovklienty.cz api-staging.ulovklienty.cz
                ~^demo[0-9]+\.staging\.ulovklienty\.cz$;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# API staging
server {
    listen 443 ssl;
    http2 on;
    server_name api-staging.ulovklienty.cz;

    ssl_certificate     /etc/letsencrypt/live/ulovklienty.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ulovklienty.cz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    # Resolver kvůli dynamickému upstream (staging kontejner nemusí běžet)
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $staging_api ulov-staging-api:8000;

    location / {
        proxy_pass http://$staging_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# Hub + cesty /salonN/ /zdravi-…/
server {
    listen 443 ssl;
    http2 on;
    server_name staging.ulovklienty.cz www.staging.ulovklienty.cz;

    ssl_certificate     /etc/letsencrypt/live/ulovklienty.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ulovklienty.cz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/sites-staging/presentace;
    index index.html;

    location /shared/ {
        alias /var/www/sites-staging/shared/;
        access_log off;
        expires 7d;
    }

    location ~ ^/(flow|salon[0-9]+|zdravi-fyzio|zdravi-veterina|zdravi-dental|remesla-instalater|remesla-elektrikar|remesla-rekonstrukce|provoz-autoservis|provoz-pujcovna|provoz-studio)(/|$) {
        root /var/www/sites-staging;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

# Volitelné: demo1.staging.ulovklienty.cz (vyžaduje DNS + cert SAN)
server {
    listen 443 ssl;
    http2 on;
    server_name ~^demo[0-9]+\.staging\.ulovklienty\.cz$;

    ssl_certificate     /etc/letsencrypt/live/ulovklienty.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ulovklienty.cz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /shared/ {
        alias /var/www/sites-staging/shared/;
        access_log off;
    }

    location / {
        root $staging_salon_root;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
