# Nginx reverse proxy pro ULOV KLIENTY API.
# PŘED nasazením nahraďte "api.vase-domena.cz" svou skutečnou API doménou
# (na stejné místo i v deploy/init-letsencrypt.sh).

upstream ulov_api {
    server api:8000;
}

# HTTP: ACME challenge pro Let's Encrypt + přesměrování na HTTPS.
server {
    listen 80;
    server_name api.vase-domena.cz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: vlastní API.
server {
    listen 443 ssl;
    http2 on;
    server_name api.vase-domena.cz;

    ssl_certificate     /etc/letsencrypt/live/api.vase-domena.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vase-domena.cz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Limit velikosti uploadu obrázků (fotky salonů jdou na Bunny přes API).
    client_max_body_size 25m;

    location / {
        proxy_pass http://ulov_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
