{% load static %}
<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Partneři{% endblock %} · ULOV KLIENTY</title>
  <link rel="stylesheet" href="{% static 'partner_admin/panel.css' %}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{% url 'partner_admin:dashboard' %}">ULOV KLIENTY <span>Superadmin</span></a>
    <nav>
      <a href="{% url 'partner_admin:dashboard' %}">Partneři</a>
      <a href="/admin/">Django admin</a>
      <form method="post" action="/admin/logout/">
        {% csrf_token %}
        <button type="submit" class="link-button">Odhlásit</button>
      </form>
    </nav>
  </header>

  <main class="page">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
